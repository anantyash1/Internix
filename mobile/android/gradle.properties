# Laptop ~8GB RAM: do NOT use -Xmx8G (Gradle + OS + Flutter will OOM Native).
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=128m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.workers.max=2
kotlin.daemon.jvmargs=-Xmx512m -XX:MaxMetaspaceSize=256m
android.useAndroidX=true
android.enableJetifier=true
android.suppressUnsupportedCompileSdkWarning=true
org.gradle.dependency.verification=off

