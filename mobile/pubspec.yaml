name: internix_mobile
description: Smart Internship Management System - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP client
  http: ^1.2.0
  http_parser: ^4.1.2

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5

  # Date/time formatting
  intl: ^0.19.0

  # URL launcher (for meeting links)
  url_launcher: ^6.2.4

  # Image picker (for attendance photo)
  image_picker: ^1.0.7

  # Camera
  camera: ^0.10.5+9
  file_picker: ^8.1.7
  path: ^1.9.1

  # PDF viewer (for reports/certificates)
  flutter_pdfview: ^1.3.2

  # Video player (for training videos)
  youtube_player_flutter: ^9.0.3

  # Icons
  cupertino_icons: ^1.0.6

  # Charts / progress (optional for dashboard)
  fl_chart: ^0.67.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Add font files under assets/fonts/ if using Inter
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700

  assets:
    - assets/images/
